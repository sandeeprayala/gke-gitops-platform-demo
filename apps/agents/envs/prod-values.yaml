nameOverride: agent
image:
  repository: us-central1-docker.pkg.dev/demo-project/app-images/agent
  tag: prod-approved
replicaCount: 3
service:
  port: 8080
resources:
  requests:
    cpu: 1000m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi
env:
  APP_ENV: prod
  BACKEND_URL: http://backend.backend-prod.svc.cluster.local:8000
  LANGFUSE_HOST: http://langfuse.platform-prod.svc.cluster.local
  TEMPORAL_HOST: temporal-frontend.platform-prod.svc.cluster.local:7233

