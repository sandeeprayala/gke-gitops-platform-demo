environment: dev
replicaCount: 1
image:
  digest: sha256:DEV_AGENTS_IMAGE_DIGEST
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 65
ingress:
  enabled: false
