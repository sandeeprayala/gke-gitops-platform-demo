nameOverride: frontend
image:
  repository: us-central1-docker.pkg.dev/demo-project/app-images/frontend
  tag: dev-latest
replicaCount: 1
service:
  port: 80
ingress:
  enabled: true
  host: frontend-dev.example.com
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
env:
  APP_ENV: dev

