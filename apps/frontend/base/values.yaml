environment: dev

image:
  repository: us-docker.pkg.dev/PROJECT_ID/insights/frontend
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

probes:
  liveness:
    path: /
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 20
  readiness:
    path: /
    port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: gce
  host: frontend.dev.example.com
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
