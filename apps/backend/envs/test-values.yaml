environment: test
replicaCount: 2
image:
  digest: sha256:TEST_BACKEND_IMAGE_DIGEST
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
ingress:
  enabled: false
secrets:
  mongodb:
    existingSecret: mongodb-conn-test
  temporal:
    existingSecret: temporal-conn-test
  langfuse:
    existingSecret: langfuse-conn-test
