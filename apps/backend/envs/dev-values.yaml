nameOverride: backend
image:
  repository: us-central1-docker.pkg.dev/demo-project/app-images/backend
  tag: dev-latest
replicaCount: 1
service:
  port: 8000
ingress:
  enabled: true
  host: backend-dev.example.com
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: dev
  MONGODB_URI_SECRET: mongodb-uri
  TEMPORAL_HOST: temporal-frontend.platform-dev.svc.cluster.local:7233

