apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-prod
  namespace: argocd
spec:
  description: Prod environment project for app and platform workloads
  sourceRepos:
    - 'https://github.com/org/gitops-platform.git'
  destinations:
    - namespace: '*-prod'
      server: 'https://kubernetes.default.svc'
    - namespace: 'platform-prod'
      server: 'https://kubernetes.default.svc'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: platform-approvers
      description: Controlled sync access for prod
      policies:
        - p, proj:platform-prod:platform-approvers, applications, get, platform-prod/*, allow
        - p, proj:platform-prod:platform-approvers, applications, sync, platform-prod/*, allow
      groups:
        - platform-approvers
