apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-workloads
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/org/gitops-platform.git
        revision: main
        directories:
          - path: apps/*
          - path: platform/*
  template:
    metadata:
      name: '{{path.basename}}-dev'
      labels:
        env: dev
        managed-by: argocd
    spec:
      project: platform-dev
      source:
        repoURL: https://github.com/org/gitops-platform.git
        targetRevision: main
        path: '{{path}}/base'
        helm:
          valueFiles:
            - ../envs/dev-values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}-dev'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
